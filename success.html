<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Margesure Pro - Confirmé</title>
    <style>
        :root { --accent: #E5A93C; --bg: #000000; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; max-width: 400px; margin: 0 auto; }
        .key-box { font-size: 32px; font-weight: 900; color: var(--accent); margin: 20px 0; letter-spacing: 2px; border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; }
        .btn { background: var(--accent); color: black; padding: 18px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; display: block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Paiement Reçu ! 💳</h1>
        <p style="color: #888;">Notez précieusement votre clé d'activation unique :</p>
        
        <div id="display-key" class="key-box">Génération...</div>
        
        <p style="font-size: 12px; color: #666;">ID Transaction : <span id="display-id">...</span></p>
        
        <a href="app.html" id="link-app" class="btn">OUVRIR MON APPLICATION</a>
    </div>

    <script>
        // 1. Récupérer l'ID dans l'URL envoyé par Stripe
        const params = new URLSearchParams(window.location.search);
        const stripeID = params.get('session_id') || "0"; 
        
        // Nettoyage de l'ID (on ne garde que les chiffres pour le calcul)
        const numericID = stripeID.replace(/\D/g, "") || "12345"; 
        
        // 2. Le calcul : (ID + 13) * 13.5
        const finalKey = (parseFloat(numericID) + 13) * 13.5;
        
        // 3. Affichage
        document.getElementById('display-key').innerText = finalKey.toFixed(0);
        document.getElementById('display-id').innerText = stripeID.substring(0, 10) + "...";
        
        // 4. On prépare le lien avec la clé pour que l'app la reconnaisse
        document.getElementById('link-app').href = "app.html?key=" + finalKey.toFixed(0);
    </script>
</body>
</html>
